<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PulseList Preview Helper</title>
    <style>
      html, body { height: 100%; margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, PingFang SC, Microsoft YaHei, sans-serif; }
      .wrap { height: 100%; display: grid; place-items: center; color: #0f172a; }
      .card { width: min(720px, 92vw); border: 1px solid rgba(15,23,42,.12); border-radius: 16px; padding: 16px 18px; background: rgba(255,255,255,.85); }
      code { background: rgba(15,23,42,.06); padding: 2px 6px; border-radius: 8px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div style="font-weight: 700; margin-bottom: 8px;">Preview helper</div>
        <div style="color: rgba(15,23,42,.7); font-size: 13px; line-height: 1.6;">
          正在写入 <code>localStorage</code> 并跳转到目标页面…
        </div>
      </div>
    </div>

    <script>
      (function () {
        const params = new URLSearchParams(location.search)
        const token = params.get('token') ?? 'dev'
        const theme = params.get('theme') ?? 'dark'
        const path = params.get('path') ?? '/dashboard'

        // auth + theme
        localStorage.setItem('pulse.token', token)
        localStorage.setItem('pulse.theme', theme)

        // keep query if provided
        const next = path.startsWith('/') ? path : '/' + path
        // slight delay to allow storage flush on some webviews
        setTimeout(() => {
          location.replace(next)
        }, 30)
      })()
    </script>
  </body>
</html>
